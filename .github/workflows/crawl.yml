name: Crawl

# Re-crawl Wikipedia every few hours, re-process, and commit the fresh
# leaderboard so the static Pages site stays current. No server, no key.
on:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours (offset to be polite to the API)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run build:data
      - run: npm run build:web
      - name: Commit refreshed leaderboard
        run: |
          git config user.name "wiki-beef-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/beefs.json docs
          if git diff --staged --quiet; then
            echo "no change in the edit wars"
          else
            git commit -m "data: refresh edit-war leaderboard [skip ci]"
            git push
          fi
